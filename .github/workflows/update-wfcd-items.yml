name: Daily update wfcd items

on:
  schedule:
    - cron: "0 0 * * *" # runs daily at midnight UTC
  workflow_dispatch: # allows manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install latest wfcd/items
        run: npm install @wfcd/items@latest

      - name: Commit changes if any
        run: |
          git config user.name "wfcd-bot"
          git config user.email "wfcd-bot@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update @wfcd/items"

      - name: Push changes
        run: git push
